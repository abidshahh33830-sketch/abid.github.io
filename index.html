<!DOCTYPE html>
<html>
<head>
    <title>Aviator Bot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PAGE -->
<div class="container">

    <h2>✈️ Aviator Bot</h2>

    <!-- 🔥 3 DOTS MENU -->
    <div class="top-menu">
        <div class="dots" onclick="toggleMenu()">⋮</div>

        <div id="menu" class="menu">
            <label>Set Limit:</label>
            <input type="number" id="limitInput" placeholder="e.g 3.56">
        </div>
    </div>

    <div id="betDisplay"></div>

    <div id="gameArea">
        <div id="plane">✈️</div>
    </div>

    <div id="multiplier">1.00x</div>

    <button onclick="startRound()">Start</button>
    <button id="nextBtn" onclick="nextRound()" disabled>Next Bet</button>

</div>

<script src="script.js"></script>

</body>
</html>
