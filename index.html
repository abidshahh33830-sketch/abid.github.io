<!DOCTYPE html>
<html>
<head>
    <title>Avatar Bot</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            color: white;
        }

        .screen {
            display: none;
            height: 100vh;
            padding-top: 100px;
        }

        .active {
            display: block;
        }

        #page1, #page2 {
            background: #2563eb;
        }

        #page3 {
            background: #0f172a;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .start { background: green; color: white; }

        input {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        #gameArea {
            width: 90%;
            height: 300px;
            border: 2px solid #334155;
            margin: auto;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background: linear-gradient(to top, #020617, #1e293b);
        }

        #plane {
            position: absolute;
            left: 0;
            bottom: 0;
            font-size: 30px;
        }

        #multiplier {
            font-size: 30px;
            margin-top: 20px;
            color: #22c55e;
        }

        #betDisplay {
            font-size: 18px;
            margin-top: 10px;
            color: #facc15;
        }
    </style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="screen active">
    <h1>🤖 Avatar Bot</h1>
    <button class="start" onclick="goPage2()">Start</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="screen">
    <h2>Enter Bet ID</h2>

    <input type="number" id="betId" placeholder="Enter Bet ID">

    <br>

    <button class="start" onclick="startGame()">Start</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="screen">

    <h2>✈️ Aviator Bot</h2>

    <div id="betDisplay"></div>

    <div id="gameArea">
        <div id="plane">✈️</div>
    </div>

    <div id="multiplier">1.00x</div>

    <button class="start" onclick="nextRound()">Next Bet</button>

</div>

<script>
    let multiplier = 1;
    let interval;
    let crashed = false;
    let crashPoint;
    let currentBet = 0;

    function goPage2() {
        document.getElementById("page1").classList.remove("active");
        document.getElementById("page2").classList.add("active");
    }

    function startGame() {

        let id = document.getElementById("betId").value;

        if (id === "") {
            alert("Enter Bet ID!");
            return;
        }

        currentBet = parseInt(id);

        document.getElementById("page2").classList.remove("active");
        document.getElementById("page3").classList.add("active");

        startRound();
    }

    function startRound() {

        document.getElementById("betDisplay").innerText = "Bet ID: " + currentBet;

        multiplier = 1;
        crashed = false;
        crashPoint = (Math.random() * 3 + 1).toFixed(2);

        const plane = document.getElementById("plane");
        plane.style.left = "0px";
        plane.style.bottom = "0px";

        clearInterval(interval);

        interval = setInterval(() => {

            if (crashed) return;

            multiplier += 0.02;
            document.getElementById("multiplier").innerText = multiplier.toFixed(2) + "x";

            plane.style.left = (multiplier * 60) + "px";
            plane.style.bottom = (multiplier * 25) + "px";

            if (multiplier >= crashPoint) {
                crashed = true;
                clearInterval(interval);
                document.getElementById("multiplier").innerText =
                    "💥 Crashed at " + crashPoint + "x";
            }

        }, 100);
    }

    function nextRound() {
        currentBet = currentBet + 1;   // 🔥 AUTO INCREMENT BET ID
        startRound();                  // 🔥 NEXT ROUND START
    }
</script>

</body>
</html>
